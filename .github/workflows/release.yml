name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build package
        run: |
          make package
          cp angkrang-*.tar.gz angkrang.tar.gz

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            angkrang.tar.gz
            angkrang-*.tar.gz
